<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA DATABASE - v12.0 PLATINUM HALL OF FAME</title>
    <style>
        :root { --bg: #0a0a0c; --card: #121215; --neon: #00ff87; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; --danger: #ff4444; --blue: #00d4ff; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1150px; }
        header { text-align: center; padding: 20px; border-bottom: 1px solid #222; cursor: pointer; }
        h1 span { color: var(--neon); }
        #admin { display: none; background: #1a1a1e; padding: 20px; border: 1px solid var(--neon); border-radius: 12px; margin: 20px 0; border-left: 5px solid var(--neon); }
        .btn { padding: 10px 15px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; margin: 2px; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-green { background: var(--neon); color: #000; }
        .tabs { display: flex; gap: 8px; justify-content: center; margin: 25px 0; flex-wrap: wrap; }
        .tab-btn { background: #222; color: #fff; padding: 10px 20px; border-radius: 30px; border: 1px solid #333; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--neon); color: #000; border-color: var(--neon); }
        .table-wrapper { background: var(--card); border-radius: 12px; overflow-x: auto; border: 1px solid #222; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; min-width: 800px; }
        th { background: #1c1c21; color: #888; padding: 15px; font-size: 10px; text-transform: uppercase; }
        td { padding: 12px 10px; border-bottom: 1px solid #1c1c21; text-align: center; }
        .player-info { display: flex; align-items: center; gap: 10px; text-align: left; }
        .club-img { width: 30px; height: 30px; object-fit: contain; border-radius: 4px; background: #000; }
        .bonus-tag { font-size: 9px; padding: 2px 5px; border-radius: 4px; margin-left: 5px; font-weight: bold; }
        .gallery-grid { display: none; flex-direction: column; gap: 30px; width: 100%; }
        .season-block { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #333; position: relative; overflow: hidden; }
        .season-block::before { content: "ÉPOCA CONCLUÍDA"; position: absolute; top: 10px; right: -30px; background: #333; font-size: 8px; padding: 5px 40px; transform: rotate(45deg); color: #888; }
        .podium-dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .dash-card { background: #1c1c21; border-radius: 10px; padding: 15px; text-align: center; border-bottom: 4px solid #333; transition: 0.3s; }
        .dash-card:hover { transform: translateY(-5px); }
        .dash-card img { width: 65px; height: 65px; object-fit: contain; margin-bottom: 10px; border-radius: 50%; border: 2px solid #333; }
        .hall-fame-title { text-align: center; color: var(--gold); font-weight: bold; font-size: 20px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .row-edit { display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; background: #25252b; padding: 10px; border-radius: 8px; }
        input { background: #000; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <header onclick="openAdmin()">
        <h1>FIFA <span>PLATINUM</span></h1>
        <p style="color:#555; font-size: 10px;">v12.0 - HALL OF FAME & LANTERNA SYSTEM</p>
    </header>

    <div id="admin">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <button class="btn btn-blue" onclick="exportData()">Exportar JSON</button>
            <button class="btn btn-blue" onclick="importData()">Importar JSON</button>
        </div>
        <div id="editor-atual"></div>
        <button class="btn btn-green" onclick="addNewPlayer()">+ Novo Técnico</button>
        <button class="btn btn-green" onclick="saveAll()" style="width:100%; margin-top:20px; height:45px;">SALVAR ALTERAÇÕES</button>
        <button class="btn" onclick="closeSeason()" style="background:#400; color:#f66; width:100%; margin-top:10px">ENCERRAR ÉPOCA (DEFINIR CAMPEÃO)</button>
    </div>

    <div class="tabs">
        <button id="t-tab" class="tab-btn active" onclick="switchTab('tabela')">TEMPORADA</button>
        <button id="r-tab" class="tab-btn" onclick="switchTab('ranking')">RANKING GERAL</button>
        <button id="g-tab" class="tab-btn" onclick="switchTab('galeria')">GALERIA DE CAMPEÕES</button>
    </div>

    <div id="view-tabela">
        <select id="season-selector" onchange="changeView(this.value)" style="width:100%; padding:12px; background:#111; color:var(--neon); border:1px solid #333; border-radius:8px; margin-bottom:15px;"></select>
        <div class="table-wrapper"><table id="table-main"></table></div>
    </div>

    <div id="view-ranking" style="display:none">
        <div class="table-wrapper"><table id="table-ranking"></table></div>
    </div>

    <div id="view-galeria" class="gallery-grid"></div>
</div>

<script>
    const STORAGE_KEY = 'fifa_platinum_v12';
    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { atual: [], historico: [] };
    let currentMode = 'atual';

    function openAdmin() { if(prompt("Senha:") === '123') document.getElementById('admin').style.display='block'; }

    function switchTab(mode) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-tabela').style.display = mode === 'tabela' ? 'block' : 'none';
        document.getElementById('view-ranking').style.display = mode === 'ranking' ? 'block' : 'none';
        document.getElementById('view-galeria').style.display = mode === 'galeria' ? 'flex' : 'none';
        if(mode === 'tabela') { document.getElementById('t-tab').classList.add('active'); renderTable(); }
        if(mode === 'ranking') { document.getElementById('r-tab').classList.add('active'); renderRankingGeral(); }
        if(mode === 'galeria') { document.getElementById('g-tab').classList.add('active'); renderGallery(); }
    }

    function calcBaseForca(gp, gc) { return (gp * 3.5) - (gc * 2.5); }

    function renderTable() {
        const selector = document.getElementById('season-selector');
        selector.innerHTML = '<option value="atual">Época Atual</option>';
        if(db.historico) db.historico.forEach((h, i) => selector.innerHTML += `<option value="${i}">${h.nome}</option>`);

        let list = currentMode === 'atual' ? [...db.atual] : [...db.historico[currentMode].dados];
        list.sort((a,b) => ((b.v*3)+b.e) - ((a.v*3)+a.e) || (b.gp-b.gc) - (a.gp-a.gc));

        const table = document.getElementById('table-main');
        table.innerHTML = `<thead><tr><th>POS</th><th style="text-align:left">TÉCNICO</th><th>PTS</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GS</th><th>%</th><th>FORÇA TOTAL</th></tr></thead>
        <tbody>${list.map((j, i) => {
            const pts = (j.v*3)+j.e; 
            const jgs = (j.v||0) + (j.e||0) + (j.d||0);
            const apr = jgs > 0 ? ((pts/(jgs*3))*100).toFixed(1) : 0;
            let fBase = calcBaseForca(j.gp, j.gc);
            let bonus = (i===0)?20 : (i===1)?10 : (i===2)?5 : (i===list.length-1 && list.length>3)?-5 : 0;
            let bTag = (i===0)?'<span class="bonus-tag" style="background:var(--gold); color:#000">+20 LÍDER</span>' : (i===1)?'<span class="bonus-tag" style="background:var(--silver); color:#000">+10 VICE</span>' : (i===2)?'<span class="bonus-tag" style="background:var(--bronze); color:#000">+5 TOP3</span>' : (i===list.length-1 && list.length>3)?'<span class="bonus-tag" style="background:var(--danger); color:#fff">-5 ZONA</span>' : "";

            return `<tr><td>${i+1}º</td><td class="player-info"><img src="${j.foto||''}" class="club-img"><b>${j.tecnico}</b>${bTag}</td><td>${pts}</td><td>${j.v}</td><td>${j.e}</td><td style="color:var(--danger)">${j.d||0}</td><td>${j.gp}</td><td>${j.gc}</td><td>${apr}%</td><td style="color:var(--gold); font-weight:bold">${(fBase + bonus).toFixed(1)}</td></tr>`;
        }).join('')}</tbody>`;
        renderEditor();
    }

    function renderRankingGeral() {
        let stats = {};
        const processar = (lista, isHist) => {
            lista.forEach((j, i) => {
                if(!stats[j.tecnico]) stats[j.tecnico] = { t:j.tecnico, part:0, j:0, v:0, e:0, d:0, gp:0, gc:0, pts:0, fAcum:0, titulos:0 };
                let s = stats[j.tecnico]; s.part++;
                s.j += ((j.v||0)+(j.e||0)+(j.d||0)); s.v += (j.v||0); s.e += (j.e||0); s.d += (j.d||0);
                s.gp += (j.gp||0); s.gc += (j.gc||0); s.pts += ((j.v*3)+(j.e));
                let fb = calcBaseForca(j.gp, j.gc);
                let bn = (i===0)?20:(i===1)?10:(i===2)?5:(i===lista.length-1 && lista.length>3)?-5:0;
                s.fAcum += (fb + bn);
                if(isHist && i===0) s.titulos++;
            });
        };
        if(db.historico) db.historico.forEach(h => processar(h.dados, true));
        processar(db.atual, false);
        let list = Object.values(stats).sort((a,b) => b.pts - a.pts || (b.gp-b.gc) - (a.gp-a.gc));
        const table = document.getElementById('table-ranking');
        table.innerHTML = `<thead><tr><th>POS</th><th style="text-align:left">TÉCNICO</th><th>PART</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GF</th><th>GS</th><th>SG</th><th>P</th><th>APR</th><th>FORÇA MÉD</th></tr></thead>
        <tbody>${list.map((j, i) => `<tr><td>${i+1}º</td><td style="text-align:left"><b>${j.t}</b> ${j.titulos>0?`<small style="color:var(--gold)">🏆${j.titulos}</small>`:''}</td><td>${j.part}</td><td>${j.j}</td><td>${j.v}</td><td>${j.e}</td><td style="color:var(--danger)">${j.d}</td><td>${j.gp}</td><td>${j.gc}</td><td style="color:${(j.gp-j.gc)>=0?'var(--neon)':'var(--danger)'}">${j.gp-j.gc}</td><td style="color:var(--neon); font-weight:bold">${j.pts}</td><td>${j.j>0?((j.pts/(j.j*3))*100).toFixed(1):0}%</td><td style="color:var(--gold); font-weight:bold">${(j.fAcum/j.part).toFixed(1)}</td></tr>`).join('')}</tbody>`;
    }

    function renderGallery() {
        const gal = document.getElementById('view-galeria');
        if(!db.historico || db.historico.length === 0) {
            gal.innerHTML = "<p style='text-align:center; color:#555'>Nenhuma época encerrada ainda. Encerre uma época no Admin para ver o pódio!</p>";
            return;
        }

        // Achar o maior campeão para o Hall of Fame
        let tits = {};
        db.historico.forEach(h => { let c = h.dados[0].tecnico; tits[c] = (tits[c] || 0) + 1; });
        let melhor = Object.entries(tits).sort((a,b) => b[1]-a[1])[0];

        gal.innerHTML = `
            <div class="hall-fame-title">💎 Hall of Fame 💎</div>
            <div style="text-align:center; margin-bottom:40px">
                <div style="color:var(--gold); font-size:14px">O MAIOR VENCEDOR</div>
                <h2 style="margin:5px 0">${melhor[0]}</h2>
                <div style="color:var(--gold)">${melhor[1]} TÍTULOS ACUMULADOS</div>
            </div>
        `;

        gal.innerHTML += db.historico.map(h => {
            const p = h.dados;
            const lanterna = p[p.length-1];
            return `
            <div class="season-block">
                <div style="color:var(--neon); font-weight:bold; margin-bottom:15px; text-transform:uppercase; letter-spacing:1px">${h.nome}</div>
                <div class="podium-dashboard">
                    <div class="dash-card" style="border-color:var(--gold)">
                        <img src="${p[0].foto}">
                        <div style="color:var(--gold); font-size:10px; font-weight:bold">🥇 CAMPEÃO</div>
                        <h4 style="margin:5px 0">${p[0].tecnico}</h4>
                    </div>
                    ${p[1]?`<div class="dash-card" style="border-color:var(--silver)">
                        <img src="${p[1].foto}">
                        <div style="color:var(--silver); font-size:10px; font-weight:bold">🥈 VICE</div>
                        <h4 style="margin:5px 0">${p[1].tecnico}</h4>
                    </div>`:''}
                    ${p[2]?`<div class="dash-card" style="border-color:var(--bronze)">
                        <img src="${p[2].foto}">
                        <div style="color:var(--bronze); font-size:10px; font-weight:bold">🥉 3º LUGAR</div>
                        <h4 style="margin:5px 0">${p[2].tecnico}</h4>
                    </div>`:''}
                    ${p.length > 3 ? `<div class="dash-card" style="border-color:var(--danger); opacity:0.8">
                        <img src="${lanterna.foto}">
                        <div style="color:var(--danger); font-size:10px; font-weight:bold">💩 LANTERNA</div>
                        <h4 style="margin:5px 0">${lanterna.tecnico}</h4>
                    </div>`:''}
                </div>
            </div>`;
        }).reverse().join('');
    }

    function renderEditor() {
        document.getElementById('editor-atual').innerHTML = db.atual.map((j, i) => `
        <div class="row-edit">
            <input style="width:90px" type="text" value="${j.tecnico}" onchange="db.atual[${i}].tecnico=this.value">
            <input style="width:110px" type="text" placeholder="URL Foto" value="${j.foto||''}" onchange="db.atual[${i}].foto=this.value">
            V<input type="number" style="width:35px" value="${j.v}" onchange="db.atual[${i}].v=parseInt(this.value)">
            E<input type="number" style="width:35px" value="${j.e}" onchange="db.atual[${i}].e=parseInt(this.value)">
            D<input type="number" style="width:35px" value="${j.d||0}" onchange="db.atual[${i}].d=parseInt(this.value)">
            GP<input type="number" style="width:35px" value="${j.gp}" onchange="db.atual[${i}].gp=parseInt(this.value)">
            GS<input type="number" style="width:35px" value="${j.gc}" onchange="db.atual[${i}].gc=parseInt(this.value)">
            <button onclick="db.atual.splice(${i},1);saveAll()" style="color:red; background:none; border:none; font-weight:bold">X</button>
        </div>`).join('');
    }

    function saveAll() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); renderTable(); }
    function addNewPlayer() { db.atual.push({tecnico: "Novo", foto: "", v:0, e:0, d:0, gp:0, gc:0}); renderTable(); }
    function changeView(v) { currentMode = v; renderTable(); }
    function exportData() {
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(db)], {type:'application/json'}));
        a.download = 'fifa_platinum_v12.json'; a.click();
    }
    function importData() {
        const f = document.createElement('input'); f.type = 'file';
        f.onchange = e => {
            const r = new FileReader(); r.readAsText(e.target.files[0]);
            r.onload = ev => { db = JSON.parse(ev.target.result); saveAll(); location.reload(); };
        }; f.click();
    }
    function closeSeason() {
        let n = prompt("Nome da Época (Ex: Copa do Mundo):");
        if(n && db.atual.length > 0) {
            db.atual.sort((a,b) => ((b.v*3)+b.e) - ((a.v*3)+a.e) || (b.gp-b.gc) - (a.gp-a.gc));
            db.historico.push({ nome: n, dados: JSON.parse(JSON.stringify(db.atual)) });
            db.atual = db.atual.map(j => ({...j, v:0, e:0, d:0, gp:0, gc:0}));
            saveAll();
        }
    }
    renderTable();
</script>
</body>
</html>
